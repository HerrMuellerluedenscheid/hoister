repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  -   repo: https://github.com/doublify/pre-commit-rust
      rev: v1.0
      hooks:
        -   id: fmt
        -   id: cargo-check

  # Clippy as a local hook so we can match CI exactly: the self-hosted
  # feature must be enabled for cfg-gated code to be linted, and warnings
  # are denied. The doublify clippy hook bakes in `cargo clippy --`, which
  # can't take cargo flags like `--features`.
  - repo: local
    hooks:
      - id: clippy
        name: clippy (matches CI)
        entry: cargo clippy --features controller/self-hosted -- --deny warnings
        language: system
        types: [rust]
        pass_filenames: false

      # Catch new source files that `git commit -a` would silently skip
      # (it stages tracked modifications only), which has broken CI builds.
      - id: check-untracked-sources
        name: check for untracked source files
        entry: scripts/check-untracked-sources.sh
        language: system
        always_run: true
        pass_filenames: false
