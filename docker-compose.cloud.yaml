# Hosted deployment stack for hoister.io.
#
# Runs on a single VPS. Caddy terminates TLS on :80/:443 and reverse-proxies
# to the controller and the cloud dashboard over a private docker network.
# Only Caddy publishes ports to the host; the controller, frontend, and
# Postgres are reachable solely via the bridge network — never from the
# public internet directly.
#
# Required env (e.g. in /etc/hoister/cloud.env on the VPS):
#   HOISTER_CLOUD_DOMAIN=hoister.io
#   HOISTER_CLOUD_API_DOMAIN=api.hoister.io
#   HOISTER_CLOUD_LE_EMAIL=ops@hoister.io
#   POSTGRES_USER=hoister
#   POSTGRES_PASSWORD=...                       # generate fresh; do NOT reuse
#   POSTGRES_DB=hoister
#   HOISTER_CONTROLLER_INTERNAL_SECRET=...      # shared by controller and BFF
#   HOISTER_CONTROLLER_TOKEN_PEPPER=...          # HMAC key for hashed agent tokens
#   HOISTER_CONTROLLER_NOTIFIER_KEY=...          # base64 32-byte AES-256-GCM key for notifier secrets at rest
#   PUBLIC_CLERK_PUBLISHABLE_KEY=pk_live_...
#   CLERK_SECRET_KEY=sk_live_...
#   CLERK_WEBHOOK_SECRET=whsec_...             # optional; only for Clerk webhooks

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    environment:
      HOISTER_CLOUD_DOMAIN: ${HOISTER_CLOUD_DOMAIN:?HOISTER_CLOUD_DOMAIN is required}
      HOISTER_CLOUD_API_DOMAIN: ${HOISTER_CLOUD_API_DOMAIN:?HOISTER_CLOUD_API_DOMAIN is required}
      HOISTER_CLOUD_LE_EMAIL: ${HOISTER_CLOUD_LE_EMAIL:?HOISTER_CLOUD_LE_EMAIL is required}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - hoister-controller
      - hoister-frontend-cloud

  hoister-controller:
    image: emrius11/hoister-controller-cloud:latest
    build:
      context: .
      dockerfile: controller/Dockerfile.cloud
    restart: unless-stopped
    expose:
      - "3033"   # agent port (reached via caddy → api.hoister.io)
      - "3034"   # internal port (reached only by the frontend over the bridge)
    environment:
      HOISTER_CONTROLLER_DATABASE_PATH: "postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@backend-db:5432/${POSTGRES_DB:?POSTGRES_DB is required}"
      # The internal listener must accept connections from the frontend
      # container, so we bind 0.0.0.0 inside the container. It is NOT
      # published to the host — `expose:` only.
      HOISTER_CONTROLLER_INTERNAL_BIND_ADDR: "0.0.0.0"
      # Shared secret the BFF includes as X-Internal-Auth on every internal
      # request. Without this, any container on the docker bridge could
      # impersonate any user by spoofing X-User-Id.
      HOISTER_CONTROLLER_INTERNAL_SECRET: ${HOISTER_CONTROLLER_INTERNAL_SECRET:?HOISTER_CONTROLLER_INTERNAL_SECRET is required}
      # HMAC pepper for agent-token storage. Hashes become unverifiable
      # without this value, so a DB dump alone is insufficient.
      HOISTER_CONTROLLER_TOKEN_PEPPER: ${HOISTER_CONTROLLER_TOKEN_PEPPER:?HOISTER_CONTROLLER_TOKEN_PEPPER is required}
      HOISTER_CONTROLLER_NOTIFIER_KEY: ${HOISTER_CONTROLLER_NOTIFIER_KEY:?HOISTER_CONTROLLER_NOTIFIER_KEY is required}
      RUST_LOG: "info,bollard=warn,hyper_util=warn"
    depends_on:
      - backend-db

  hoister-frontend-cloud:
    image: emrius11/hoister-frontend-cloud:latest
    build:
      context: frontend-cloud
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      HOISTER_CONTROLLER_URL: "http://hoister-controller:3034"
      HOISTER_CONTROLLER_INTERNAL_SECRET: ${HOISTER_CONTROLLER_INTERNAL_SECRET:?HOISTER_CONTROLLER_INTERNAL_SECRET is required}
      ORIGIN: "https://${HOISTER_CLOUD_DOMAIN:?HOISTER_CLOUD_DOMAIN is required}"
      PUBLIC_CLERK_PUBLISHABLE_KEY: ${PUBLIC_CLERK_PUBLISHABLE_KEY:?PUBLIC_CLERK_PUBLISHABLE_KEY is required}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      # Optional — only needed once a Clerk webhook endpoint is wired up.
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      # PostHog project key (EU). Optional — unset disables analytics entirely.
      # Captures still require the user to opt in via the cookie banner.
      PUBLIC_POSTHOG_KEY: ${PUBLIC_POSTHOG_KEY:-}
      # Slack app credentials for the "Add to Slack" button on /notifiers.
      # Optional — unset hides the button. Redirect URL registered with the
      # Slack app must be https://${HOISTER_CLOUD_DOMAIN}/slack/oauth/callback.
      PUBLIC_SLACK_CLIENT_ID: ${PUBLIC_SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
    depends_on:
      - hoister-controller

  backend-db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    # No ports published; the controller reaches Postgres over the bridge.
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      # Postgres 18 stores data under /var/lib/postgresql/<major>/. Mount the
      # parent directory so the version-specific subdir lives inside the volume.
      - postgres-data:/var/lib/postgresql

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
