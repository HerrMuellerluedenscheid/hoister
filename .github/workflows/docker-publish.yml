name: Build All Services

on:
  push:
    # Build on every branch. main and tags get the semver/latest tags (see
    # docker-build-reusable.yml); other branches are published under their
    # branch name slugified into a valid Docker tag (e.g. feat/cloud ->
    # feat-cloud) via docker/metadata-action's `type=ref,event=branch`.
    branches: [ "**" ]
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-hoister:
    uses: ./.github/workflows/docker-build-reusable.yml
    with:
      context: .
      dockerfile: agent/Dockerfile
      image_name: hoister/hoister
    secrets:
      registry_password: ${{ secrets.DOCKERHUB_PASSWORD }}

  build-controller:
    uses: ./.github/workflows/docker-build-reusable.yml
    with:
      context: .
      dockerfile: controller/Dockerfile
      image_name: hoister/hoister-controller
    secrets:
      registry_password: ${{ secrets.DOCKERHUB_PASSWORD }}

  build-frontend:
    uses: ./.github/workflows/docker-build-reusable.yml
    with:
      context: frontend
      dockerfile: frontend/Dockerfile
      image_name: hoister/hoister-frontend
      runs-on: 'ubuntu-24.04'
    secrets:
      registry_password: ${{ secrets.DOCKERHUB_PASSWORD }}

  build-frontend-cloud:
    uses: ./.github/workflows/docker-build-reusable.yml
    with:
      context: frontend-cloud
      dockerfile: frontend-cloud/Dockerfile
      image_name: hoister/hoister-frontend-cloud
      runs-on: 'ubuntu-24.04'
    secrets:
      registry_password: ${{ secrets.DOCKERHUB_PASSWORD }}
