# Complete self-hosted Hoister stack for a single host:
# agent + controller + dashboard, plus an example app to watch.
#
# Run it with:
#   docker compose -f docker-compose.selfhost.yaml up -d
#
# Then open the dashboard at http://localhost:3000 (user: admin, password: "password").
# Change HOISTER_AUTH_PASSWORD before exposing it anywhere.
services:
  # The service you want kept up to date. Add the hoister.enable label to any
  # container Hoister should manage.
  app:
    image: nginx:latest
    labels:
      - "hoister.enable=true"

  # The Hoister agent: watches the Docker socket, applies updates and rollbacks,
  # and reports container state to the self-hosted controller.
  hoister:
    image: emrius11/hoister:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      # Point the agent at the local controller instead of the hosted cloud.
      HOISTER_CONTROLLER_URL: "http://hoister-controller:3033"
      # Identifies this host in the dashboard. Without it the agent reports
      # the hostname as "undefined".
      HOISTER_HOSTNAME: my-host
      HOISTER_SCHEDULE_INTERVAL: "30"
    labels:
      # Hide Hoister's own containers from the dashboard.
      - "hoister.hide=true"

  # Aggregates rollout results and container stats from all agents.
  hoister-controller:
    image: emrius11/hoister-controller:latest
    restart: unless-stopped
    volumes:
      - controller-data:/data  # persist deployments across restarts
    environment:
      # Origin of the dashboard as reached from a browser, used to deep-link
      # notifications to the container details page. Defaults to the hosted
      # dashboard; point it at this stack's frontend. Set it to the public URL
      # when exposing the dashboard beyond localhost.
      HOISTER_CONTROLLER_DASHBOARD_URL: "http://localhost:3000"
    labels:
      - "hoister.hide=true"

  # Web dashboard for the controller.
  hoister-frontend:
    image: emrius11/hoister-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      HOISTER_CONTROLLER_URL: "http://hoister-controller:3033"
      HOISTER_AUTH_USERNAME: admin
      # bcrypt hash of "password". A clear-text value also works, but a hash
      # is preferred. Generate one with: htpasswd -bnBC 5 "" yourpassword | tr -d ':\n'
      # Every "$" is doubled to "$$" so Docker Compose does not treat it as a
      # variable reference and mangle the hash.
      HOISTER_AUTH_PASSWORD: $$2b$$05$$9cQr6ip8PmR0dUN3..NR0.UazKLunYc/RrjpzI8GrGg5eSvsqbbiC
    labels:
      - "hoister.hide=true"

volumes:
  controller-data:
